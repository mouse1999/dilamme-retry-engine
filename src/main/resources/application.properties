spring.application.name=dilamme-retry-engine
server.port=8080

# SQLite datasource
spring.datasource.url=jdbc:sqlite:retry-engine.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate / JPA

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Enable WAL mode for concurrent reads (API server) + writes (worker) in same process
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL; PRAGMA foreign_keys=ON;

# Scheduling
spring.task.scheduling.pool.size=2

# Logging ? show retry worker activity clearly
logging.level.com.dilamme.retryengine.worker=INFO
logging.level.com.dilamme.retryengine=INFO